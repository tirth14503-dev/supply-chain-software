{% extends "base.html" %}
{% block title %}Delete {{ type }}{% endblock %}
{% block page_title %}Delete {{ type }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-5">
  <div class="card border-danger">
    <div class="card-body text-center py-5">
      <i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
      <h5 class="mt-3">Delete {{ type }}?</h5>
      <p class="text-muted">Are you sure you want to delete <strong>{{ object }}</strong>? This action cannot be undone.</p>
      <form method="post" class="d-flex gap-2 justify-content-center mt-4">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancel</a>
      </form>
    </div>
  </div>
</div>
</div>
{% endblock %}
