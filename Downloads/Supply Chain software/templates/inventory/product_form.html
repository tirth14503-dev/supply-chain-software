{% extends "base.html" %}
{% block title %}{{ action }} Product{% endblock %}
{% block page_title %}{{ action }} Product{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-7">
<div class="card">
  <div class="card-body">
    <h5 class="fw-semibold mb-4">{{ action }} Product</h5>
    <form method="post">
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">SKU <span class="text-danger">*</span></label>
          <input type="text" name="sku" value="{{ product.sku|default:'' }}" class="form-control" required>
        </div>
        <div class="col-md-8">
          <label class="form-label">Product Name <span class="text-danger">*</span></label>
          <input type="text" name="name" value="{{ product.name|default:'' }}" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Category</label>
          <select name="category" class="form-select">
            <option value="">— None —</option>
            {% for cat in categories %}<option value="{{ cat.pk }}" {% if product.category_id == cat.pk %}selected{% endif %}>{{ cat.name }}</option>{% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Unit Price ($) <span class="text-danger">*</span></label>
          <input type="number" step="0.01" name="unit_price" value="{{ product.unit_price|default:'' }}" class="form-control" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Unit</label>
          <input type="text" name="unit" value="{{ product.unit|default:'pcs' }}" class="form-control">
        </div>
        <div class="col-md-4">
          <label class="form-label">Reorder Point</label>
          <input type="number" name="reorder_point" value="{{ product.reorder_point|default:'10' }}" class="form-control">
        </div>
        <div class="col-12">
          <label class="form-label">Description</label>
          <textarea name="description" class="form-control" rows="3">{{ product.description|default:'' }}</textarea>
        </div>
      </div>
      <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-primary">{{ action }} Product</button>
        <a href="{% url 'product_list' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
</div>
</div>
{% endblock %}
