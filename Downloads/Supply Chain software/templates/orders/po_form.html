{% extends "base.html" %}
{% block title %}New Purchase Order{% endblock %}
{% block page_title %}New Purchase Order{% endblock %}
{% block content %}
<div class="card">
  <div class="card-body">
    <h5 class="fw-semibold mb-4">Create Purchase Order</h5>
    <form method="post">
      {% csrf_token %}
      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <label class="form-label">Supplier <span class="text-danger">*</span></label>
          <select name="supplier" class="form-select" required>
            <option value="">Select supplier…</option>
            {% for s in suppliers %}<option value="{{ s.pk }}">{{ s.name }}</option>{% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Deliver to Warehouse <span class="text-danger">*</span></label>
          <select name="warehouse" class="form-select" required>
            <option value="">Select warehouse…</option>
            {% for w in warehouses %}<option value="{{ w.pk }}">{{ w.name }}</option>{% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Expected Delivery Date</label>
          <input type="date" name="expected_date" class="form-control">
        </div>
        <div class="col-12">
          <label class="form-label">Notes</label>
          <textarea name="notes" class="form-control" rows="2"></textarea>
        </div>
      </div>

      <h6 class="fw-semibold mb-3">Order Items</h6>
      <div id="items-container">
        <div class="row g-2 mb-2 item-row">
          <div class="col-md-5">
            <select name="product_id" class="form-select form-select-sm">
              <option value="">Select product…</option>
              {% for p in products %}<option value="{{ p.pk }}" data-price="{{ p.unit_price }}">{{ p.name }} ({{ p.sku }})</option>{% endfor %}
            </select>
          </div>
          <div class="col-md-2"><input type="number" name="quantity" placeholder="Qty" class="form-control form-control-sm" min="1"></div>
          <div class="col-md-2"><input type="number" step="0.01" name="unit_price" placeholder="Price" class="form-control form-control-sm"></div>
          <div class="col-auto"><button type="button" class="btn btn-sm btn-outline-danger remove-row"><i class="bi bi-x"></i></button></div>
        </div>
      </div>
      <button type="button" id="add-row" class="btn btn-sm btn-outline-secondary mt-2"><i class="bi bi-plus-lg me-1"></i>Add Item</button>

      <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-primary">Create Purchase Order</button>
        <a href="{% url 'po_list' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const products = [
  {% for p in products %}{"id":"{{ p.pk }}","name":"{{ p.name }} ({{ p.sku }})","price":"{{ p.unit_price }}"},{% endfor %}
];

function buildSelect(selected='') {
  let opts = '<option value="">Select product…</option>';
  products.forEach(p => opts += `<option value="${p.id}" data-price="${p.price}" ${p.id==selected?'selected':''}>${p.name}</option>`);
  return opts;
}

document.getElementById('add-row').addEventListener('click', () => {
  const row = document.createElement('div');
  row.className = 'row g-2 mb-2 item-row';
  row.innerHTML = `
    <div class="col-md-5"><select name="product_id" class="form-select form-select-sm product-sel">${buildSelect()}</select></div>
    <div class="col-md-2"><input type="number" name="quantity" placeholder="Qty" class="form-control form-control-sm" min="1"></div>
    <div class="col-md-2"><input type="number" step="0.01" name="unit_price" placeholder="Price" class="form-control form-control-sm price-field"></div>
    <div class="col-auto"><button type="button" class="btn btn-sm btn-outline-danger remove-row"><i class="bi bi-x"></i></button></div>`;
  document.getElementById('items-container').appendChild(row);
  row.querySelector('.product-sel').addEventListener('change', autofillPrice);
  row.querySelector('.remove-row').addEventListener('click', () => row.remove());
});

function autofillPrice(e) {
  const opt = e.target.selectedOptions[0];
  const priceField = e.target.closest('.item-row').querySelector('.price-field');
  if (opt && opt.dataset.price) priceField.value = opt.dataset.price;
}

document.querySelectorAll('.product-sel').forEach(sel => sel.addEventListener('change', autofillPrice));
document.querySelectorAll('.remove-row').forEach(btn => btn.addEventListener('click', () => btn.closest('.item-row').remove()));
</script>
{% endblock %}
