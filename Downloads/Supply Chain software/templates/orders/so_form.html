{% extends "base.html" %}
{% block title %}New Sales Order{% endblock %}
{% block page_title %}New Sales Order{% endblock %}
{% block content %}
<div class="card">
  <div class="card-body">
    <h5 class="fw-semibold mb-4">Create Sales Order</h5>
    <form method="post">
      {% csrf_token %}
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label class="form-label">Customer Name <span class="text-danger">*</span></label>
          <input type="text" name="customer_name" class="form-control" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Email</label>
          <input type="email" name="customer_email" class="form-control">
        </div>
        <div class="col-md-3">
          <label class="form-label">Phone</label>
          <input type="text" name="customer_phone" class="form-control">
        </div>
        <div class="col-md-4">
          <label class="form-label">Ship From Warehouse <span class="text-danger">*</span></label>
          <select name="warehouse" class="form-select" required>
            <option value="">Select warehouse…</option>
            {% for w in warehouses %}<option value="{{ w.pk }}">{{ w.name }}</option>{% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Required Date</label>
          <input type="date" name="required_date" class="form-control">
        </div>
        <div class="col-md-8">
          <label class="form-label">Shipping Address</label>
          <input type="text" name="shipping_address" class="form-control">
        </div>
        <div class="col-12">
          <label class="form-label">Notes</label>
          <textarea name="notes" class="form-control" rows="2"></textarea>
        </div>
      </div>

      <h6 class="fw-semibold mb-3">Order Items</h6>
      <div id="items-container">
        <div class="row g-2 mb-2 item-row">
          <div class="col-md-5">
            <select name="product_id" class="form-select form-select-sm product-sel">
              <option value="">Select product…</option>
              {% for p in products %}<option value="{{ p.pk }}" data-price="{{ p.unit_price }}">{{ p.name }} ({{ p.sku }})</option>{% endfor %}
            </select>
          </div>
          <div class="col-md-2"><input type="number" name="quantity" placeholder="Qty" class="form-control form-control-sm" min="1"></div>
          <div class="col-md-2"><input type="number" step="0.01" name="unit_price" placeholder="Price" class="form-control form-control-sm price-field"></div>
          <div class="col-auto"><button type="button" class="btn btn-sm btn-outline-danger remove-row"><i class="bi bi-x"></i></button></div>
        </div>
      </div>
      <button type="button" id="add-row" class="btn btn-sm btn-outline-secondary mt-2"><i class="bi bi-plus-lg me-1"></i>Add Item</button>

      <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-primary">Create Sales Order</button>
        <a href="{% url 'so_list' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const products = [{% for p in products %}{"id":"{{ p.pk }}","name":"{{ p.name }} ({{ p.sku }})","price":"{{ p.unit_price }}"},{% endfor %}];

function buildSelect() {
  return '<option value="">Select product…</option>' + products.map(p => `<option value="${p.id}" data-price="${p.price}">${p.name}</option>`).join('');
}

document.getElementById('add-row').addEventListener('click', () => {
  const row = document.createElement('div');
  row.className = 'row g-2 mb-2 item-row';
  row.innerHTML = `
    <div class="col-md-5"><select name="product_id" class="form-select form-select-sm product-sel">${buildSelect()}</select></div>
    <div class="col-md-2"><input type="number" name="quantity" placeholder="Qty" class="form-control form-control-sm" min="1"></div>
    <div class="col-md-2"><input type="number" step="0.01" name="unit_price" placeholder="Price" class="form-control form-control-sm price-field"></div>
    <div class="col-auto"><button type="button" class="btn btn-sm btn-outline-danger remove-row"><i class="bi bi-x"></i></button></div>`;
  document.getElementById('items-container').appendChild(row);
  row.querySelector('.product-sel').addEventListener('change', autofill);
  row.querySelector('.remove-row').addEventListener('click', () => row.remove());
});

function autofill(e) {
  const opt = e.target.selectedOptions[0];
  const price = e.target.closest('.item-row').querySelector('.price-field');
  if (opt?.dataset.price) price.value = opt.dataset.price;
}
document.querySelectorAll('.product-sel').forEach(s => s.addEventListener('change', autofill));
document.querySelectorAll('.remove-row').forEach(b => b.addEventListener('click', () => b.closest('.item-row').remove()));
</script>
{% endblock %}
