{% extends "base.html" %}
{% block title %}New Shipment{% endblock %}
{% block page_title %}New Shipment{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-7">
<div class="card"><div class="card-body">
  <h5 class="fw-semibold mb-4">Create Shipment</h5>
  <form method="post">
    {% csrf_token %}
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Tracking Number</label>
        <input type="text" name="tracking_number" class="form-control" placeholder="Auto-generated if blank">
      </div>
      <div class="col-md-6">
        <label class="form-label">Type <span class="text-danger">*</span></label>
        <select name="shipment_type" class="form-select" required>
          <option value="outbound">Outbound (to customer)</option>
          <option value="inbound">Inbound (from supplier)</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Carrier <span class="text-danger">*</span></label>
        <input type="text" name="carrier" class="form-control" required placeholder="e.g. FedEx, DHL, UPS">
      </div>
      <div class="col-md-6">
        <label class="form-label">Weight (kg)</label>
        <input type="number" step="0.01" name="weight_kg" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Origin <span class="text-danger">*</span></label>
        <input type="text" name="origin" class="form-control" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Destination <span class="text-danger">*</span></label>
        <input type="text" name="destination" class="form-control" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Ship Date</label>
        <input type="date" name="ship_date" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Estimated Delivery</label>
        <input type="date" name="estimated_delivery" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Link to Sales Order</label>
        <select name="sales_order" class="form-select">
          <option value="">— None —</option>
          {% for o in sales_orders %}<option value="{{ o.pk }}">{{ o.so_number }} – {{ o.customer_name }}</option>{% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Link to Purchase Order</label>
        <select name="purchase_order" class="form-select">
          <option value="">— None —</option>
          {% for o in purchase_orders %}<option value="{{ o.pk }}">{{ o.po_number }} – {{ o.supplier.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="col-12">
        <label class="form-label">Notes</label>
        <textarea name="notes" class="form-control" rows="2"></textarea>
      </div>
    </div>
    <div class="mt-4 d-flex gap-2">
      <button type="submit" class="btn btn-primary">Create Shipment</button>
      <a href="{% url 'shipment_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div></div>
</div></div>
{% endblock %}
