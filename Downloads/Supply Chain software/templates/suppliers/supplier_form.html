{% extends "base.html" %}
{% block title %}{{ action }} Supplier{% endblock %}
{% block page_title %}{{ action }} Supplier{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-7">
<div class="card"><div class="card-body">
  <h5 class="fw-semibold mb-4">{{ action }} Supplier</h5>
  <form method="post">
    {% csrf_token %}
    <div class="row g-3">
      <div class="col-md-8">
        <label class="form-label">Company Name <span class="text-danger">*</span></label>
        <input type="text" name="name" value="{{ supplier.name|default:'' }}" class="form-control" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Status</label>
        <select name="status" class="form-select">
          <option value="active" {% if supplier.status == 'active' or not supplier %}selected{% endif %}>Active</option>
          <option value="inactive" {% if supplier.status == 'inactive' %}selected{% endif %}>Inactive</option>
          <option value="blacklisted" {% if supplier.status == 'blacklisted' %}selected{% endif %}>Blacklisted</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Contact Person</label>
        <input type="text" name="contact_person" value="{{ supplier.contact_person|default:'' }}" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Email</label>
        <input type="email" name="email" value="{{ supplier.email|default:'' }}" class="form-control">
      </div>
      <div class="col-md-4">
        <label class="form-label">Phone</label>
        <input type="text" name="phone" value="{{ supplier.phone|default:'' }}" class="form-control">
      </div>
      <div class="col-md-4">
        <label class="form-label">Country</label>
        <input type="text" name="country" value="{{ supplier.country|default:'' }}" class="form-control">
      </div>
      <div class="col-md-4">
        <label class="form-label">Lead Time (days)</label>
        <input type="number" name="lead_time_days" value="{{ supplier.lead_time_days|default:'7' }}" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Payment Terms</label>
        <input type="text" name="payment_terms" value="{{ supplier.payment_terms|default:'' }}" class="form-control" placeholder="e.g. Net 30">
      </div>
      <div class="col-md-6">
        <label class="form-label">Rating (0–5)</label>
        <input type="number" step="0.1" min="0" max="5" name="rating" value="{{ supplier.rating|default:'5.0' }}" class="form-control">
      </div>
      <div class="col-12">
        <label class="form-label">Address</label>
        <textarea name="address" class="form-control" rows="2">{{ supplier.address|default:'' }}</textarea>
      </div>
      <div class="col-12">
        <label class="form-label">Notes</label>
        <textarea name="notes" class="form-control" rows="2">{{ supplier.notes|default:'' }}</textarea>
      </div>
    </div>
    <div class="mt-4 d-flex gap-2">
      <button type="submit" class="btn btn-primary">{{ action }} Supplier</button>
      <a href="{% url 'supplier_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div></div>
</div></div>
{% endblock %}
