<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — SupplyChain Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .login-wrap {
      width: 100%; max-width: 420px; padding: 1rem;
    }
    .brand-logo {
      text-align: center; margin-bottom: 2rem;
    }
    .brand-logo .icon-wrap {
      width: 72px; height: 72px; border-radius: 20px;
      background: linear-gradient(135deg, #4e9af1, #6d28d9);
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 1rem; box-shadow: 0 8px 32px rgba(78,154,241,.35);
    }
    .brand-logo .icon-wrap i { font-size: 2rem; color: #fff; }
    .brand-logo h1 { font-size: 1.6rem; font-weight: 700; color: #fff; margin: 0; }
    .brand-logo h1 span { color: #4e9af1; }
    .brand-logo p { color: #94a3b8; font-size: .9rem; margin-top: .3rem; }
    .login-card {
      background: rgba(255,255,255,.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px;
      padding: 2rem 2.5rem;
      box-shadow: 0 25px 50px rgba(0,0,0,.4);
    }
    .login-card h2 { color: #fff; font-size: 1.25rem; font-weight: 600; margin-bottom: 1.5rem; }
    .form-label { color: #cbd5e1; font-size: .85rem; font-weight: 500; margin-bottom: .4rem; }
    .input-group-text {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      color: #94a3b8;
    }
    .form-control {
      background: rgba(255,255,255,.08) !important;
      border: 1px solid rgba(255,255,255,.15);
      color: #fff !important;
      border-left: none;
    }
    .form-control:focus {
      background: rgba(255,255,255,.12) !important;
      border-color: #4e9af1;
      box-shadow: none;
      color: #fff !important;
    }
    .form-control::placeholder { color: #64748b; }
    .btn-login {
      background: linear-gradient(135deg, #4e9af1, #3b82f6);
      border: none; color: #fff; font-weight: 600;
      padding: .75rem; border-radius: 10px;
      width: 100%; font-size: 1rem;
      transition: all .2s; margin-top: .5rem;
    }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(78,154,241,.4); color: #fff; }
    .alert-danger {
      background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.3);
      color: #fca5a5; border-radius: 10px; font-size: .88rem;
    }
    .footer-note { text-align: center; color: #475569; font-size: .8rem; margin-top: 1.5rem; }
    .role-badges { display: flex; flex-wrap: wrap; gap: .4rem; justify-content: center; margin-top: 1rem; }
    .role-badge {
      font-size: .7rem; padding: .2em .6em; border-radius: 20px;
      background: rgba(255,255,255,.07); color: #94a3b8; border: 1px solid rgba(255,255,255,.1);
    }
    .toggle-pw { cursor: pointer; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); border-left: none; color: #94a3b8; }
    .toggle-pw:hover { color: #4e9af1; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="brand-logo">
    <div class="icon-wrap"><i class="bi bi-boxes"></i></div>
    <h1>Supply<span>Chain</span> Pro</h1>
    <p>Enterprise Supply Chain Management</p>
  </div>

  <div class="login-card">
    <h2>Sign in to your account</h2>

    {% if error %}
    <div class="alert alert-danger d-flex align-items-center gap-2 mb-3">
      <i class="bi bi-exclamation-circle-fill"></i>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <form method="post" autocomplete="on">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Enter your username"
                 value="{{ request.POST.username|default:'' }}" autocomplete="username" autofocus required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" id="pwField" class="form-control"
                 placeholder="Enter your password" autocomplete="current-password" required>
          <button type="button" class="toggle-pw input-group-text" onclick="togglePw()">
            <i class="bi bi-eye" id="pwIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>
  </div>

  <div class="footer-note">
    <div>SupplyChain Pro &copy; 2025 &mdash; Secure Access</div>
    <div class="role-badges">
      <span class="role-badge">Admin</span>
      <span class="role-badge">Manager</span>
      <span class="role-badge">Warehouse</span>
      <span class="role-badge">Procurement</span>
      <span class="role-badge">Sales</span>
      <span class="role-badge">Viewer</span>
    </div>
  </div>
</div>

<script>
function togglePw() {
  const f = document.getElementById('pwField');
  const ic = document.getElementById('pwIcon');
  if (f.type === 'password') {
    f.type = 'text';
    ic.className = 'bi bi-eye-slash';
  } else {
    f.type = 'password';
    ic.className = 'bi bi-eye';
  }
}
</script>
</body>
</html>
